<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIBOK — Film stratégique · Pilote Flacq</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&family=Newsreader:ital,opsz,wght@0,18..72,400;0,18..72,500;1,18..72,400;1,18..72,500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#05101f;overflow:hidden;font-family:'Schibsted Grotesk',sans-serif}
  #root{position:fixed;inset:0}
  .boot{position:fixed;inset:0;display:grid;place-items:center;color:#9DB0CE;font-family:'Schibsted Grotesk',sans-serif;letter-spacing:.3em;font-size:14px}
</style>
</head>
<body>
<div id="root"><div class="boot">CHARGEMENT…</div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="animations.jsx"></script>
<script type="text/babel" src="film-lib.jsx"></script>
<script type="text/babel" src="film-content.jsx"></script>
<script type="text/babel" src="film-content2.jsx"></script>
<script src="build/vo-manifest.js"></script>

<script type="text/babel" data-presets="react">
(function(){
const { Stage, Sprite, Scene, FX, Hud, C } = window;

function Movie(){
  const scenes = window.SCENES_A.concat(window.SCENES_B);
  const OV = 0.5; // crossfade overlap (s)
  let cursor = 0;
  const placed = scenes.map((s,i)=>{
    const dur = (window.VO && window.VO[i] && window.VO[i].dur) ? window.VO[i].dur : s.dur;
    const start = cursor;
    const end = start + dur;
    cursor = end - OV;
    return { ...s, dur, start, end };
  });
  const total = placed.length ? placed[placed.length-1].end : 10;

  return (
    <Stage width={1920} height={1080} duration={total} background={C.navy} persistKey="tibokfilm" loop={true}>
      {placed.map((s,i)=>(
        <Sprite key={i} start={s.start} end={s.end}>
          <Scene>
            <FX hue={s.hue} intensity={0.55}/>
            {s.node}
          </Scene>
        </Sprite>
      ))}
      <Hud/>
      <Seeker/>
      <VoiceOver placed={placed}/>
    </Stage>
  );
}

function Seeker(){
  const { setTime, setPlaying } = window.useTimeline();
  React.useEffect(()=>{ window.__seek=(t)=>{setPlaying(false);setTime(t);}; window.__play=()=>setPlaying(true); },[setTime,setPlaying]);
  return null;
}

function VoiceOver({placed}){
  const { time, playing } = window.useTimeline();
  const [muted, setMuted] = React.useState(false);
  const st = React.useRef({audio:null, idx:-1});
  React.useEffect(()=>{
    const a = typeof Audio!=='undefined' ? new Audio() : null;
    if(a){ a.preload='auto'; }
    st.current.audio = a;
    const onKey=(e)=>{ if(e.key==='m'||e.key==='M') setMuted(m=>!m); };
    window.addEventListener('keydown', onKey);
    return ()=>{ window.removeEventListener('keydown', onKey); if(a) a.pause(); };
  },[]);
  React.useEffect(()=>{
    const s=st.current, a=s.audio; if(!a) return;
    if(muted){ if(!a.paused) a.pause(); return; }
    let idx=-1; for(let i=0;i<placed.length;i++){ if(time>=placed[i].start) idx=i; else break; }
    const vo = (idx>=0 && window.VO) ? window.VO[idx] : null;
    if(!playing || !vo){ if(!a.paused) a.pause(); return; }
    if(s.idx!==idx){ s.idx=idx; a.src=vo.file; try{a.currentTime=0;}catch(e){} }
    const off = time - placed[idx].start;
    if(Math.abs((a.currentTime||0)-off) > 1.5){ try{ a.currentTime=Math.max(0,off); }catch(e){} }
    if(a.paused){ a.play().catch(()=>{}); }
  });
  const FD=window.FD;
  return (
    <div onClick={()=>setMuted(m=>!m)} title="Activer / couper la voix off (M)"
      style={{position:'absolute',right:48,bottom:128,zIndex:60,pointerEvents:'auto',cursor:'pointer',
        display:'flex',alignItems:'center',gap:10,padding:'11px 18px',borderRadius:999,
        background:'rgba(16,30,56,0.85)',border:'1px solid '+(muted?'rgba(255,255,255,0.18)':C.blue),
        boxShadow:muted?'none':'0 0 18px '+C.blue+'66',backdropFilter:'blur(4px)',
        fontFamily:FD,fontWeight:600,fontSize:18,color:muted?'rgba(220,230,245,0.7)':'#fff',userSelect:'none'}}>
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor" stroke="none"/>
        {muted ? <path d="M16 9l5 6M21 9l-5 6"/> : <path d="M16.5 8.5a5 5 0 0 1 0 7M19 6a8 8 0 0 1 0 12"/>}
      </svg>
      {muted ? 'Voix coupée' : 'Voix activée'}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Movie/>);
})();
</script>
</body>
</html>
